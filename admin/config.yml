backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "images"

# Decap CMS will use Netlify Identity for login
site_url: https://thebestofamerica.org
display_url: https://thebestofamerica.org

collections:
  - name: "honorees"
    label: "Honorees"
    description: "Manage honoree cards on the Honorees page"
    files:
      - name: "honorees_page"
        label: "Honorees Page"
        file: "honorees.html"
        fields:
          - { label: "Page Content (HTML)", name: "body", widget: "code", default_language: "html" }

  - name: "sponsors"
    label: "Local Patriot Businesses"
    description: "Manage the Local Patriot Businesses page"
    files:
      - name: "lpb_page"
        label: "Local Patriot Businesses Page"
        file: "local-patriot-businesses.html"
        fields:
          - { label: "Page Content (HTML)", name: "body", widget: "code", default_language: "html" }
